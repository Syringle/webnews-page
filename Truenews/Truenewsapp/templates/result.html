<!DOCTYPE html>
<html lang="ru">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body class="bg bg-dark">
<header class="p-3 text-bg-dark">
    <div class="container">
        <div class="d-flex flex-wrap align-items-center justify-content-center justify-content-lg-start">
            <a href="/" class="d-flex align-items-center mb-2 mb-lg-0 text-white text-decoration-none">
                <span class="text-white">Новости</span>
            </a>

            <ul class="nav col-12 col-lg-auto me-lg-auto mb-2 justify-content-center mb-md-0">
                <li><a href="/" class="nav-link px-2 text-white">Главная</a></li>
            </ul>

            <form class="col-12 col-lg-auto mb-3 mb-lg-0 me-lg-3" role="search">
                <input type="search" class="form-control form-control-dark text-white" placeholder="Поиск..." aria-label="Поиск">
            </form>

            <div class="text-end">
                <button type="button" class="btn btn-outline-light me-2">Войти</button>
                <button type="button" class="btn btn-warning">Регистрация</button>
            </div>
        </div>
    </div>
    <hr class="text-white">
</header>

<div class="container px-4 py-5">
    <h2 class="pb-2 border-bottom text-white">Результаты по поиску <i class="text-warning">"{{ category.name }}"</i></h2>
    <div class="row g-4 py-5 row-cols-1 row-cols-lg-2">
        {% for news in news_list %}
        <div class="col">
            <div class="card bg-secondary text-white">
                <div class="card-body">
                    <h3 class="card-title">{{ news.title }}</h3>
                    <p class="card-text">{{ news.short_description }}</p>
                    <a href="/news/{{ news.id }}" class="btn btn-warning">Читать далее</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
</body>
</html>
