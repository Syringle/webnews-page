<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{ news.title }}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
</head>
<body class="bg-dark text-white">
<header class="p-3 text-bg-dark">
    <div class="container">
        <div class="d-flex flex-wrap align-items-center justify-content-between">
            <a href="/" class="text-white text-decoration-none">
                <span class="fs-4">Truenews | Правдивые новости</span>
            </a>
            <ul class="nav">
                <li><a href="/" class="nav-link px-2 text-white">Главная</a></li>
                <li><a href="/categories" class="nav-link px-2 text-white">Категории</a></li>
            </ul>
            <form class="col-12 col-lg-auto mb-3 mb-lg-0 me-lg-3" role="search">
                <input type="search" class="form-control form-control-dark text-white" placeholder="Поиск..." aria-label="Search">
            </form>
        </div>
    </div>
    <hr class="text-white">
</header>

<div class="container col-xxl-8 px-4 py-5">
    <div class="row flex-lg-row-reverse align-items-center g-5 py-5">
        <div class="col-10 col-sm-8 col-lg-6">
            <img src="{{ news.image.url }}" class="d-block mx-lg-auto img-fluid" alt="{{ news.title }}" width="700" height="500" loading="lazy">
        </div>
        <div class="col-lg-6">
            <h1 class="display-5 fw-bold lh-1 mb-3">{{ news.title }}</h1>
            <p class="lead">{{ news.description }}</p>
            <p class="text-muted">Дата публикации: {{ news.published_at }}</p>
            <p class="text-muted">Автор: {{ news.author }}</p>
        </div>
    </div>
</div>
</body>
</html>
